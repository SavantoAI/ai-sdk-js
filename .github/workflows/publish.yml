name: Publish to npm

# Publishes `@savantoai/ai-sdk` to npmjs.org with sigstore provenance.
#
# Trigger modes:
#   1. Tag push: `v2.1.0`, `v2.1.1`, etc. — publishes the tagged version.
#      Tag must match `version` field in package.json.
#   2. Manual run (`workflow_dispatch`):
#        - dry_run=true (default): runs full pipeline + `npm publish --dry-run`
#        - dry_run=false: runs full pipeline + actual `npm publish`
#
# Auth: requires the `NPM_TOKEN` repo secret. Provenance is automatic
# via GitHub OIDC (`id-token: write` permission below).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + pack without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    name: Publish @savantoai/ai-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@savantoai'

      - name: Verify package.json version matches git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Git tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm install --include=optional --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Pack tarball (sanity check)
        run: npm pack --dry-run

      - name: Publish to npmjs (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --dry-run

      - name: Publish to npmjs
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
