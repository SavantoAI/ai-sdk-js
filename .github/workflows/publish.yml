name: Publish to npm

# Publishes `@savantoai/ai-sdk` to npmjs.org with sigstore provenance.
#
# Trigger modes:
#   1. Tag push: `v2.1.0`, `v2.1.1`, etc. — publishes the tagged version.
#      Tag must match `version` field in package.json.
#   2. Manual run (`workflow_dispatch`):
#        - dry_run=true (default): runs full pipeline + `npm publish --dry-run`
#        - dry_run=false: runs full pipeline + actual `npm publish`
#
# Auth: uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed.
# The matching trusted-publisher entry on npmjs.com is configured at
#   https://www.npmjs.com/package/@savantoai/ai-sdk/access
# pointing at this repo + this workflow file. The `id-token: write`
# permission below lets GitHub mint the OIDC token npm uses to verify
# the publish came from this workflow. Provenance attestations also
# flow through the same OIDC token.
#
# If npm ever rejects the publish with "OIDC token verification failed",
# re-check the trusted-publisher entry's `repository` + `workflow_filename`
# fields match this workflow exactly (case-sensitive).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + pack without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    name: Publish @savantoai/ai-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # registry-url is still required so `npm publish` knows where
          # to push. `scope` is intentionally omitted — it only affects
          # token-based auth, which we no longer use.
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package.json version matches git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Git tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm install --include=optional --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Pack tarball (sanity check)
        run: npm pack --dry-run

      - name: Publish to npmjs (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: npm publish --provenance --access public --dry-run

      - name: Publish to npmjs
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        run: npm publish --provenance --access public
